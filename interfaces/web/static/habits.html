<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habits — L.O.O.M.</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Habits page layout ───────────────────────────── */
    .habits-main {
      position: fixed;
      top: var(--navbar-h);
      bottom: 0;
      left: 0; right: 0;
      overflow-y: auto;
      padding: 32px 24px 40px;
    }

    .habits-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    .habits-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .habits-title {
      font-size: 20px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .habit-add-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--cyan);
      background: rgba(0, 212, 255, 0.07);
      color: var(--cyan);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .habit-add-btn:hover { background: rgba(0, 212, 255, 0.15); }

    /* Add habit form */
    .habit-add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: msgIn 0.2s ease both;
    }
    .habit-add-form.hidden { display: none; }

    .habit-add-form input[type="text"],
    .habit-add-form input:not([type="number"]) {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .habit-add-form input:focus { border-color: rgba(0, 212, 255, 0.4); }

    .habit-form-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .habit-form-row label {
      font-size: 13px;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 160px;
    }
    .habit-form-row input {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 14px;
      width: 90px;
      outline: none;
    }
    .habit-form-row input:focus { border-color: rgba(0, 212, 255, 0.4); }

    .habit-color-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .habit-swatch {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .habit-swatch:hover { transform: scale(1.15); }
    .habit-swatch.selected { border-color: var(--text); transform: scale(1.2); }

    .habit-form-btns {
      display: flex;
      gap: 10px;
    }
    .habit-form-btns button {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #habitSaveBtn {
      background: var(--cyan);
      color: #000;
      border: none;
      font-weight: 600;
    }
    #habitSaveBtn:hover    { background: #33dcff; }
    #habitSaveBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #habitCancelBtn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    #habitCancelBtn:hover { border-color: var(--text); color: var(--text); }

    /* Grid */
    .habits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
    }
    .habits-loading,
    .habits-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 48px 0;
    }

    /* Habit card */
    .habit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--habit-color, var(--cyan));
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: box-shadow 0.2s;
      animation: msgIn 0.25s ease both;
    }
    .habit-card:hover { box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.12); }
    .habit-card.done  { border-left-color: #22c55e; }
    .habit-card.done:hover { box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.15); }

    .habit-card-body { flex: 1; min-width: 0; }

    .habit-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .habit-week-badge {
      display: inline-block;
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      margin-bottom: 4px;
    }
    .habit-week-badge.met {
      background: rgba(34, 197, 94, 0.12);
      color: #22c55e;
    }

    .habit-streak {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .habit-desc {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.7;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .habit-goal { margin: 6px 0 4px; }
    .habit-goal-bar {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 3px;
    }
    .habit-goal-fill {
      height: 100%;
      background: var(--habit-color, var(--cyan));
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .habit-goal-label { font-size: 10px; color: var(--muted); }

    .habit-history-toggle {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.2s;
      display: block;
      margin-top: 6px;
    }
    .habit-history-toggle:hover { color: var(--text); }

    .habit-history {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .habit-history.hidden { display: none; }

    .hist-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .hist-date { color: var(--muted); min-width: 52px; }
    .hist-note { color: var(--text); opacity: 0.7; font-style: italic; }

    .habit-card-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .habit-checkin-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      line-height: 1;
    }
    .habit-checkin-btn:not(:disabled):hover { border-color: #22c55e; color: #22c55e; }
    .habit-checkin-btn.done {
      border-color: #22c55e;
      color: #22c55e;
      background: rgba(34, 197, 94, 0.1);
    }
    .habit-checkin-btn:disabled { cursor: default; }

    .habit-delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
      line-height: 1;
      padding: 2px;
    }
    .habit-card:hover .habit-delete-btn { opacity: 1; }
    .habit-delete-btn:hover { color: #ef4444; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-icon">🧵</span>
      <span class="logo-text">L.O.O.M.</span>
    </div>
    <div class="nav-links">
      <a href="/"       class="nav-link muted">Home</a>
      <a href="/habits" class="nav-link active">Habits</a>
      <a href="#"       class="nav-link muted">Jobs</a>
      <a href="#"       class="nav-link muted">Prompts</a>
    </div>
    <div class="nav-right">
      <span class="status-dot"></span>
      <span class="status-label">ONLINE</span>
    </div>
  </nav>

  <main class="habits-main">

    <!-- Aurora -->
    <div class="aurora">
      <div class="aurora-blob blob-1"></div>
      <div class="aurora-blob blob-2"></div>
      <div class="aurora-blob blob-3"></div>
    </div>

    <div class="habits-inner">
      <div class="habits-header">
        <h2 class="habits-title">Habits</h2>
        <button class="habit-add-btn" id="habitAddBtn">+ New Habit</button>
      </div>

      <div class="habit-add-form hidden" id="habitAddForm">
        <input id="habitNameInput" type="text" placeholder="Habit name (e.g. DSA Practice)" />
        <input id="habitDescInput" type="text" placeholder="Description (optional)" />
        <div class="habit-form-row">
          <label for="habitFreqInput">Days per week</label>
          <input id="habitFreqInput" type="number" min="1" max="7" value="7" />
        </div>
        <div class="habit-form-row">
          <label for="habitGoalInput">Goal sessions (optional)</label>
          <input id="habitGoalInput" type="number" min="0" placeholder="e.g. 30" />
        </div>
        <div class="habit-color-row" id="colorPicker"></div>
        <div class="habit-form-btns">
          <button id="habitSaveBtn">Save</button>
          <button id="habitCancelBtn" type="button">Cancel</button>
        </div>
      </div>

      <div class="habits-grid" id="habitsGrid">
        <div class="habits-loading">Loading...</div>
      </div>
    </div>
  </main>

  <script>
    const HABIT_COLORS = ['#00d4ff', '#8b5cf6', '#ec4899', '#22c55e', '#f59e0b', '#ef4444'];
    let selectedColor = HABIT_COLORS[0];

    // Color swatches
    const picker = document.getElementById('colorPicker');
    HABIT_COLORS.forEach((color, i) => {
      const s = document.createElement('button');
      s.type = 'button';
      s.className = 'habit-swatch' + (i === 0 ? ' selected' : '');
      s.style.background = color;
      s.addEventListener('click', () => {
        selectedColor = color;
        picker.querySelectorAll('.habit-swatch').forEach(sw => sw.classList.remove('selected'));
        s.classList.add('selected');
      });
      picker.appendChild(s);
    });

    async function loadHabits() {
      const grid = document.getElementById('habitsGrid');
      try {
        const habits = await fetch('/api/habits').then(r => r.json());
        grid.innerHTML = habits.length === 0
          ? '<div class="habits-empty">No habits yet — add one above!</div>'
          : habits.map(renderCard).join('');
      } catch {
        grid.innerHTML = '<div class="habits-empty">Could not load habits.</div>';
      }
    }

    function renderCard(h) {
      const doneClass = h.checked_today ? 'done' : '';
      const freq = h.frequency_per_week;
      const streak = h.streak;

      let streakText, weekBadge = '';
      if (freq === 7) {
        streakText = streak > 0 ? `🔥 ${streak} day${streak !== 1 ? 's' : ''} streak` : 'Start your streak today';
      } else {
        const wc = h.this_week_count;
        weekBadge = `<span class="habit-week-badge ${wc >= freq ? 'met' : ''}">${wc}/${freq} this week</span>`;
        streakText = streak > 0 ? `🔥 ${streak} week${streak !== 1 ? 's' : ''} streak` : 'Start your streak';
      }

      let goalBar = '';
      if (h.goal_days) {
        const pct = Math.min(100, Math.round((h.total_checkins / h.goal_days) * 100));
        goalBar = `<div class="habit-goal">
          <div class="habit-goal-bar"><div class="habit-goal-fill" style="width:${pct}%"></div></div>
          <span class="habit-goal-label">${h.total_checkins}/${h.goal_days} sessions</span>
        </div>`;
      }

      return `<div class="habit-card ${doneClass}" style="--habit-color:${h.color}">
        <div class="habit-card-body">
          <div class="habit-name">${h.name}</div>
          ${weekBadge}
          <div class="habit-streak">${streakText}</div>
          ${h.description ? `<div class="habit-desc">${h.description}</div>` : ''}
          ${goalBar}
          <button class="habit-history-toggle" onclick="toggleHistory(event,${h.id})">▾ History</button>
          <div class="habit-history hidden" id="hist-${h.id}"></div>
        </div>
        <div class="habit-card-actions">
          <button class="habit-checkin-btn ${doneClass}" onclick="checkin(${h.id})"
                  ${h.checked_today ? 'disabled' : ''} title="${h.checked_today ? 'Done today' : 'Log today'}">
            ${h.checked_today ? '✓' : '○'}
          </button>
          <button class="habit-delete-btn" onclick="deleteHabit(${h.id})" title="Delete">×</button>
        </div>
      </div>`;
    }

    async function checkin(id) {
      await fetch(`/api/habits/${id}/checkin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note: '' }),
      });
      loadHabits();
    }

    async function deleteHabit(id) {
      if (!confirm('Delete this habit and all its history?')) return;
      await fetch(`/api/habits/${id}`, { method: 'DELETE' });
      loadHabits();
    }

    async function toggleHistory(e, id) {
      e.stopPropagation();
      const btn = e.currentTarget;
      const box = document.getElementById('hist-' + id);
      if (!box) return;
      if (!box.classList.contains('hidden')) {
        box.classList.add('hidden');
        btn.textContent = '▾ History';
        return;
      }
      if (!box.dataset.loaded) {
        box.innerHTML = '<span style="color:var(--muted);font-size:12px">Loading...</span>';
        box.classList.remove('hidden');
        const logs = await fetch(`/api/habits/${id}/logs`).then(r => r.json());
        box.dataset.loaded = '1';
        box.innerHTML = logs.length === 0
          ? '<span style="color:var(--muted);font-size:12px">No check-ins yet.</span>'
          : logs.map(l => {
              const d = new Date(l.checked_on + 'T00:00:00');
              const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
              return `<div class="hist-row"><span class="hist-date">${label}</span>${l.note ? `<span class="hist-note">${l.note}</span>` : ''}</div>`;
            }).join('');
      } else {
        box.classList.remove('hidden');
      }
      btn.textContent = '▴ History';
    }

    // Add habit form
    const addBtn    = document.getElementById('habitAddBtn');
    const addForm   = document.getElementById('habitAddForm');
    const cancelBtn = document.getElementById('habitCancelBtn');
    const saveBtn   = document.getElementById('habitSaveBtn');

    addBtn.addEventListener('click', () => addForm.classList.toggle('hidden'));
    cancelBtn.addEventListener('click', () => { addForm.classList.add('hidden'); resetForm(); });

    saveBtn.addEventListener('click', async () => {
      const name = document.getElementById('habitNameInput').value.trim();
      if (!name) { alert('Habit name is required.'); return; }
      const description   = document.getElementById('habitDescInput').value.trim();
      const frequency_per_week = parseInt(document.getElementById('habitFreqInput').value) || 7;
      const goalVal       = parseInt(document.getElementById('habitGoalInput').value);
      const goal_days     = goalVal > 0 ? goalVal : null;

      saveBtn.disabled = true;
      try {
        const res = await fetch('/api/habits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description, color: selectedColor, frequency_per_week, goal_days }),
        });
        if (res.status === 409) { alert((await res.json()).detail); return; }
        addForm.classList.add('hidden');
        resetForm();
        loadHabits();
      } finally {
        saveBtn.disabled = false;
      }
    });

    function resetForm() {
      document.getElementById('habitNameInput').value = '';
      document.getElementById('habitDescInput').value = '';
      document.getElementById('habitFreqInput').value = '7';
      document.getElementById('habitGoalInput').value = '';
      selectedColor = HABIT_COLORS[0];
      picker.querySelectorAll('.habit-swatch').forEach((s, i) => s.classList.toggle('selected', i === 0));
    }

    // Load on page open
    loadHabits();
  </script>
</body>
</html>
